title: Aog-present
author: Aaron Gullickson
version: 0.0.1
quarto-required: ">=1.3.0"
contributes:
  common:
    primary-color: "#131516"
    secondary-color: "#3A3F42"
    bg-color: "#F4F4F2"
    accent1: "#1F4E79"
    accent2: "#2C5D63"
    accent3: "#6B2C3E"
  formats:
    revealjs:
      theme: simple
      css: custom.css
      template-partials:
        - partials/styles.html
      chalkboard: false
      preview-links: true
      incremental: true
      smaller: false
      background-transition: concave
      fig-align: center
      highlight-style: arrow
      code-line-numbers: false
      self-contained: false
      out-width: "100%"
      fig-asp: 0.5625
      fig-format: svg
        
