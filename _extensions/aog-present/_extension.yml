title: Aog-present
author: Aaron Gullickson
version: 0.0.1
quarto-required: ">=1.3.0"
contributes:
  formats:
    revealjs:
      theme: simple
      css: custom.css
      template-partials:
        - partials/styles.html
      chalkboard: false
      preview-links: true
      incremental: true
      smaller: false
      background-transition: concave
      highlight-style: arrow
      code-line-numbers: false
      self-contained: false
      # control figure position and sizing 
      fig-align: center
      out-width: "100%"
      fig-asp: 0.5625 # default for full slide figure
      fig-format: svg
      # add default values for color scheme
      metadata:
        bg-color: "#F4F4F2"
        primary-color: "#131516"
        secondary-color: "#3A3F42"
        accent1: "#1F4E79"
        accent2: "#6B2C3E"
        accent3: "#2C5D63"